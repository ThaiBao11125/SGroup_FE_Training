<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <div>🥹 TRANSFORM - HOVER VÀO TỪNG Ô</div>
  <div class="container-1">
    <div class="transform-1">translate</div>
    <div class="transform-2">rotate</div>
    <div class="transform-3">scale</div>
    <div class="transform-4">combine</div>
  </div>
  <div>🖼️ OVERLAY EFFECT - HOVER VÀO CARD</div>
  <div class="container-2">
    <div class="overlay-1">
      <img src="avatar.jpg" alt="">
    </div>
    <div class="overlay-2">
      <img src="HolySadie.jpg" alt="">
    </div>
    <div class="overlay-3">
      <img src="TenderHera.jpeg" alt="">
    </div>
  </div>
  <div>✨ @KEYFRAMES ANIMATION</div>
  <div class="container-3">
    <div class="keyframes-1">bounce</div>
    <div class="keyframes-2">spin</div>
    <div class="keyframes-3">pulse</div>
    <div class="keyframes-4">slideIn</div>
  </div>
  <div>⏳ CSS LOADERS</div>
  <div class="container-4">
    <div class="loader-1"></div>
    <div class="loader-2">
      <span class="dot-1"></span>
      <span class="dot-2"></span>
      <span class="dot-3"></span>
    </div>
    <div class="loader-3">
      <div class="bar-1"></div>
      <div class="bar-2"></div>
      <div class="bar-3"></div>
      <div class="bar-4"></div>
      <div class="bar-5"></div>
    </div>
  </div>
</body>
</html>
